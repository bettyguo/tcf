# Phase 9 launch checklist ‚Äî drives scripts/release/sign_audit_report.py.
#
# Each gate item has:
#   - id: a stable identifier (used as the row key in the readiness report)
#   - description: human-readable line shown in the report
#   - evidence: relative path to the evidence file (under data/audit/phase9/
#     unless otherwise noted)
#   - required: whether failure blocks the release (true by default)
#   - pass_marker: optional regex; if set, the file must contain a match.
#     If omitted, mere existence of the evidence file passes the gate.
#
# Order matters: items render in this order in the report.

version: 1
release_tag: v1.0.0
phase: 9

gates:
  - id: prior_phases_passed
    description: All previous phase gates passed (Phase 1..8 evaluate docs ‚úÖ/‚öÝ-with-handoff).
    evidence: prior_phases_passed.md
    pass_marker: '^STATUS:\s+pass$'

  - id: pedagogy_audit_pass
    description: Pedagogy audit pass ‚Äî 12 cohorts within ¬±10pp of planner projection.
    evidence: pedagogy_audit.json
    pass_marker: '"overall_pass":\s*true'

  - id: security_audit_pass
    description: Security audit pass ‚Äî OWASP Top 10 controls + clean toolchain.
    evidence: security_audit.md
    pass_marker: '^STATUS:\s+pass$'

  - id: performance_audit_pass
    description: Performance audit pass ‚Äî sustained p95<250ms, burst error <0.1%, cold-start <60s.
    evidence: perf_summary.md
    pass_marker: '^STATUS:\s+pass$'

  - id: content_audit_pass
    description: Content audit pass ‚Äî distribution + hand-review + FEI drift + PII/copyright/harm.
    evidence: content_audit.md
    pass_marker: '^STATUS:\s+pass$'

  - id: accessibility_audit_pass
    description: Accessibility audit pass ‚Äî Lighthouse ‚â• 90 + pa11y clean + WCAG 2.2 AA sign-off.
    evidence: a11y_conformance.md
    pass_marker: '^STATUS:\s+pass$'

  - id: documentation_audit_pass
    description: Documentation audit pass ‚Äî no TODO markers; each doc has a second-maintainer signoff.
    evidence: docs_audit.md
    pass_marker: '^STATUS:\s+pass$'

  - id: risk_register_clean
    description: Every Open risk has a Mitigated, Accepted, or Retired disposition (zero Open).
    evidence: risk_register_check.md
    pass_marker: '^OPEN_COUNT:\s+0$'

  - id: fei_source_check
    description: FEI source-of-truth re-verified against current FEI page (auditor + date recorded).
    evidence: fei_source_check.md
    pass_marker: '^STATUS:\s+verified$'

  - id: kappa_publication
    description: Published Œ∫ ‚â• 0.65 on EE and EO; table embedded in README receipts section.
    evidence: kappa_publication.md
    pass_marker: '^STATUS:\s+pass$'

  - id: release_artefacts_built
    description: Docker images + Helm chart + SBOM + checksums built and (optionally) signed.
    evidence: release_artefacts.md
    pass_marker: '^STATUS:\s+pass$'

  - id: demo_deploy_48h
    description: Demo deployment running and observed for 48h with no P0 alerts.
    evidence: demo_observation.md
    pass_marker: '^STATUS:\s+pass$'
