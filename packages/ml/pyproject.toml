[project]
name = "tcf-accel-ml"
version = "0.1.0"
description = "ML services: CEFR classifier, ASR, alignment, auto-scoring, LLM gateway. Phase 3+ fills in."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [{ name = "tcf-accel contributors" }]

dependencies = [
    "tcf-accel-shared",
    "pydantic>=2.7,<3.0",
    # Heavy runtime deps (transformers, faster-whisper, MFA glue, litellm,
    # sentence-transformers, spacy[fr]) land in Phase 3+.
]

[dependency-groups]
dev = [
    "pytest>=8.3,<9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tcf_accel_ml"]

[tool.uv.sources]
tcf-accel-shared = { workspace = true }
