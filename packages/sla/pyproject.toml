[project]
name = "tcf-accel-sla"
version = "0.1.0"
description = "Scheduler (FSRS+LECTOR), Bayesian NCLC estimator, diagnostic, planner. Phase 4 fills in."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [{ name = "tcf-accel contributors" }]

dependencies = [
    "tcf-accel-shared",
    "pydantic>=2.7,<3.0",
    # Runtime deps land in Phase 4 (fsrs, numpy, scipy, scikit-learn, ortools).
]

[dependency-groups]
dev = [
    "pytest>=8.3,<9.0",
    "hypothesis>=6.112,<7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tcf_accel_sla"]

[tool.uv.sources]
tcf-accel-shared = { workspace = true }
