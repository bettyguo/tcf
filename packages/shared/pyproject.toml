[project]
name = "tcf-accel-shared"
version = "0.1.0"
description = "Shared schemas, errors, ids, and types for tcf-accel. Frozen after Phase 1."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [{ name = "tcf-accel contributors" }]

dependencies = [
    "pydantic>=2.7,<3.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3,<9.0",
    "hypothesis>=6.112,<7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tcf_accel"]
