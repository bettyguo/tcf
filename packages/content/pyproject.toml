[project]
name = "tcf-accel-content"
version = "0.1.0"
description = "Content pipeline: ingestion, CEFR classification, item synthesis, quality gate. Phase 3 fills in."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [{ name = "tcf-accel contributors" }]

dependencies = [
    "tcf-accel-shared",
    "pydantic>=2.7,<3.0",
    # Heavy runtime deps (datasets, soundfile, librosa, beautifulsoup4, feedparser,
    # python-magic) land in Phase 3.
]

[dependency-groups]
dev = [
    "pytest>=8.3,<9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tcf_accel_content"]

[tool.uv.sources]
tcf-accel-shared = { workspace = true }
