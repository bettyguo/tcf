name: Pages

# Builds the public docs site (README + LIMITATIONS + LEARNER_GUIDE +
# PEDAGOGY + ARCHITECTURE + OPERATIONS + LAUNCH_READINESS_REPORT + ADRs +
# Phase 9 audit dossier) via Jekyll and deploys to GitHub Pages.
#
# The runtime application is NOT deployed here — see OPERATIONS.md for
# self-hosting. This workflow only publishes documentation + audit
# receipts.

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Pages deploy needs write to the deployment + read on the repo.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; cancel intermediate runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
