# Alembic configuration for tcf-accel.
# Migrations live under infra/migrations/; this file pins the env.py location.
# DATABASE_URL_SYNC (see .env.example) is read in env.py.

[alembic]
script_location = infra/migrations
prepend_sys_path = .
version_path_separator = os
# Single-database; multi-database support not required in Phase 2.
sqlalchemy.url =

# Format the version filename as: 0001_short_slug.py
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40

# Use UTC timestamps in migration script comments.
timezone = UTC

[post_write_hooks]
# Lint the generated migration with ruff. Phase 2 audit checks the migration
# is ruff-clean; this hook makes the developer experience consistent.
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

# Logging — quiet by default; raise to INFO for debugging upgrade/downgrade.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
