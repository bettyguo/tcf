# tcf-accel pre-commit hooks. Install via `make setup` (runs `pre-commit install`).
# All hooks must be deterministic; no network access at commit time.

minimum_pre_commit_version: "3.8.0"
default_language_version:
  python: python3.12

repos:
  # ─── Generic hygiene ────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
        exclude: '^apps/web/(tsconfig\.json|.*\.code-workspace)$'   # tsconfig allows comments
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key

  # ─── Ruff (lint + format) ──────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ─── Mypy (touched files only) ─────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: '^(apps|packages)/.+\.py$'
        additional_dependencies:
          - pydantic>=2.7
          - types-PyYAML

  # ─── Secrets scan ───────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ─── Markdown lint ──────────────────────────────────────────
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.14.0
    hooks:
      - id: markdownlint-cli2
        args: ["--config", ".markdownlint.jsonc"]
        # Excluded files: planning docs are authoritative spec and may use custom emphasis
        exclude: '^(00_MASTER_PROMPT|0[1-9]_[A-Z_]+|phase\d+_[a-z]+)\.md$'

  # ─── Custom: enforce data/ exclusion (master prompt §6.3) ──
  - repo: local
    hooks:
      - id: check-no-data-commit
        name: forbid committing files under data/
        entry: python scripts/check_no_data_commit.py
        language: python
        pass_filenames: true

      - id: check-no-todo-in-public-docstring
        name: forbid TODO in public docstrings (Phase 1 anti-criterion)
        entry: python scripts/check_no_todo_docstring.py
        language: python
        files: '^(apps|packages)/.+\.py$'
        pass_filenames: true

  # ─── JS / TS lint via pnpm lint-staged ─────────────────────
  - repo: local
    hooks:
      - id: pnpm-eslint
        name: eslint (web)
        entry: bash -c 'cd apps/web && pnpm exec eslint --max-warnings 0 "$@"' --
        language: system
        files: '^apps/web/.*\.(ts|tsx|js|jsx|mjs|cjs)$'
        pass_filenames: true
