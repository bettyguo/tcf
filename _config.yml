# Jekyll config for the tcf-accel GitHub Pages docs site.
#
# What this site is:
#   The public-facing docs + "honesty receipts" for tcf-accel v1.0.0,
#   PLUS a static interactive demo of the system's UI surfaces
#   (readiness widget, credible interval, plan view).
#
# What this site is NOT:
#   The running application. The FastAPI backend, Celery worker, Postgres,
#   Redis cannot run on GitHub Pages (static-only). To run the live system,
#   self-host per OPERATIONS.md.

title: "tcf-accel"
tagline: "Open-source, evidence-based French training for the TCF Canada."
description: "B1 → NCLC 7–9 in 12 weeks. Honest, audited, self-hostable. v1.0.0."
url: "https://bettyguo.github.io"
baseurl: "/tcf"
repository: "bettyguo/tcf"
github_url: "https://github.com/bettyguo/tcf"
release_url: "https://github.com/bettyguo/tcf/releases/tag/v1.0.0"

# No theme — we use a hand-crafted layout under _layouts/default.html.
# The cayman theme is intentionally NOT pulled in; we render every page
# through our own typography + nav.
theme:

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "code"
    block:
      line_numbers: false

permalink: pretty

# Plugins. Only GitHub-Pages-allowed plugins work without a custom build.
plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-titles-from-headings
  - jekyll-seo-tag

relative_links:
  enabled: true
  collections: true

optional_front_matter:
  remove_originals: true

titles_from_headings:
  enabled: true
  strip_title: true
  collections: true

# Top navigation. Each entry is rendered in _includes/nav.html.
# `external: true` marks GitHub-blob links so they get the external icon.
nav:
  - title: "Try it"
    url: /try/
  - title: "Learn"
    url: /learn/
  - title: "Limitations"
    url: /LIMITATIONS/
  - title: "Operators"
    url: /OPERATIONS/
  - title: "Reviewers"
    url: /PEDAGOGY/
  - title: "Decisions"
    url: /adrs/
  - title: "GitHub"
    url: https://github.com/bettyguo/tcf
    external: true

# Footer link groups.
footer:
  - title: "Read"
    links:
      - { title: "Limitations", url: "/LIMITATIONS/" }
      - { title: "Learner guide", url: "/LEARNER_GUIDE/" }
      - { title: "Pedagogy dossier", url: "/PEDAGOGY/" }
      - { title: "Operations runbook", url: "/OPERATIONS/" }
      - { title: "Learner studio (interactive)", url: "/learn/" }
  - title: "Verify"
    links:
      - { title: "Launch Readiness Report", url: "/LAUNCH_READINESS_REPORT/" }
      - { title: "Pedagogy audit JSON", url: "/data/audit/phase9/pedagogy_audit.json" }
      - { title: "κ table", url: "/data/calibration/ee.v1.report/" }
      - { title: "Risk register", url: "/RISK_REGISTER/" }
  - title: "Build"
    links:
      - { title: "Architecture", url: "/ARCHITECTURE/" }
      - { title: "All 48 ADRs", url: "/adrs/" }
      - { title: "v1.1 roadmap", url: "/docs/roadmap/v1.1/" }
      - { title: "Changelog", url: "/CHANGELOG/" }
  - title: "Project"
    links:
      - { title: "GitHub repo", url: "https://github.com/bettyguo/tcf" }
      - { title: "v1.0.0 release", url: "https://github.com/bettyguo/tcf/releases/tag/v1.0.0" }
      - { title: "Contributing", url: "https://github.com/bettyguo/tcf/blob/main/CONTRIBUTING.md" }
      - { title: "Security disclosure", url: "/SECURITY/" }

# Files / directories Jekyll must NOT process.
exclude:
  - .venv/
  - .git/
  - .github/
  - .pre-commit-config.yaml
  - Makefile
  - alembic.ini
  - apps/
  - dist/
  - infra/
  - node_modules/
  - packages/
  - pnpm-workspace.yaml
  - pnpm-lock.yaml
  - pyproject.toml
  - scripts/
  - tests/
  - uv.lock
  - vendor/
  - "*.lock"
  - "*.toml"
  - "*.cfg"
  - "*.ini"
  - README-OG.md
