# tcf-accel local development stack.
# `make dev` starts these (db + redis + qdrant) and then runs api + web on the host.
# Networking: all services bind to 127.0.0.1; nothing is exposed to the LAN.

name: tcf-accel

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: tcf-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tcf
      POSTGRES_PASSWORD: tcf
      POSTGRES_DB: tcf
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ../data/pg:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tcf -d tcf"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tcf-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ../data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    # ADR-0002 keeps Qdrant as a swap-in for pgvector. We start it for forward-compatibility;
    # the application defaults to pgvector and ignores Qdrant in Phase 1.
    image: qdrant/qdrant:v1.10.0
    container_name: tcf-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - ../data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
