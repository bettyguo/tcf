          type: string
        payload_bytes:
          description: Size of the submitted artifact; the artifact itself is not
            in the response.
          minimum: 0.0
          title: Payload Bytes
          type: integer
        payload_sha256:
          description: SHA-256 of the submitted artifact.
          maxLength: 64
          minLength: 64
          pattern: ^[a-f0-9]{64}$
          title: Payload Sha256
          type: string
        rubric_speaking:
          anyOf:
          - $ref: '#/components/schemas/SpeakingRubric'
          - type: 'null'
          description: Set when status='graded' and module='EO'.
        rubric_writing:
          anyOf:
          - $ref: '#/components/schemas/WritingRubric'
          - type: 'null'
          description: Set when status='graded' and module='EE'.
        status:
          enum:
          - pending
          - grading
          - graded
          - failed
          title: Status
          type: string
        submitted_at:
          format: date-time
          title: Submitted At
          type: string
        user_id:
          format: uuid
          title: User Id
          type: string
      required:
      - id
      - user_id
      - item_id
      - module
      - status
      - submitted_at
      - payload_bytes
      - payload_sha256
      title: SubmissionView
      type: object
    TokenPair:
      additionalProperties: false
      description: JWT pair. `access_token` is short-lived; `refresh_token` is long-lived.
      properties:
        access_token:
          title: Access Token
          type: string
        access_ttl_s:
          description: Seconds until access_token expires.
          maximum: 3600.0
          minimum: 60.0
          title: Access Ttl S
          type: integer
        refresh_token:
          title: Refresh Token
          type: string
        refresh_ttl_s:
          description: Seconds until refresh_token expires.
          minimum: 3600.0
          title: Refresh Ttl S
          type: integer
        token_type:
          default: Bearer
          title: Token Type
          type: string
      required:
      - access_token
      - refresh_token
      - access_ttl_s
      - refresh_ttl_s
      title: TokenPair
      type: object
    UpdateMeRequest:
      additionalProperties: false
      description: 'Partial update of the profile. Only the supplied fields are changed.


        Sending an empty body is a no-op (returns the unchanged profile).'
      properties:
        daily_minutes_budget:
          anyOf:
          - maximum: 480.0
            minimum: 15.0
            type: integer
          - type: 'null'
          title: Daily Minutes Budget
        display_name:
          anyOf:
          - maxLength: 80
            type: string
          - type: 'null'
          title: Display Name
        locale:
          anyOf:
          - enum:
            - en
            - fr
            - es
            - ar
            - zh
            type: string
          - type: 'null'
          title: Locale
        privacy_mode:
          anyOf:
          - enum:
            - local_only
            - cloud_optin
            type: string
          - type: 'null'
          title: Privacy Mode
        target_exam_date:
          anyOf:
          - format: date
            type: string
          - type: 'null'
          title: Target Exam Date
        target_nclc:
          anyOf:
          - maximum: 12.0
            minimum: 4.0
            type: integer
          - type: 'null'
          title: Target Nclc
      title: UpdateMeRequest
      type: object
    V1HealthResponse:
      additionalProperties: false
      description: Versioned health response.
      properties:
        api_version:
          default: v1
          title: Api Version
          type: string
        phase:
          default: 2
          description: The phase that owns the current API surface (frozen contract).
          title: Phase
          type: integer
        schema_version:
          default: 0.4.0
          title: Schema Version
          type: string
        status:
          default: ok
          title: Status
          type: string
      title: V1HealthResponse
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
    WeakPoint:
      additionalProperties: false
      description: One identified error pattern, derived from interactions + rubrics.
      properties:
        last_seen:
          format: date-time
          title: Last Seen
          type: string
        occurrences:
          minimum: 1.0
          title: Occurrences
          type: integer
        pattern:
          description: Short human-readable label, e.g. 'subjunctive after que' or
            'fr-CA accent confusable'.
          minLength: 1
          title: Pattern
          type: string
        severity:
          enum:
          - low
          - medium
          - high
          title: Severity
          type: string
        skill:
          enum:
          - CO
          - CE
          - EE
          - EO
          title: Skill
          type: string
        suggested_drill:
          anyOf:
          - type: string
          - type: 'null'
          description: Pointer to a drill type the planner can schedule (DrillType
            enum value).
          title: Suggested Drill
      required:
      - skill
      - pattern
      - occurrences
      - last_seen
      - severity
      title: WeakPoint
      type: object
    WritingRubric:
      additionalProperties: false
      description: 'The graded output of the Phase 7 EE auto-scorer.


        Component invariant: `total_20` is derived from the five primary

        components (`task_completion`, `coherence_cohesion`, `lexical_range`,

        `grammatical_accuracy`, `register_appropriateness`) by scaling

        `sum(components)` from `[0, 25]` to `[0, 20]`; off-by-one is

        tolerated to allow the Phase 7 calibration layer to nudge the

        total without breaking the contract.


        `canadian_context_integration` is non-null only for Task 2 & 3

        (the prompts that require Canadian context per

        `EEContent.required_canadian_context`).'
      properties:
        canadian_context_integration:
          anyOf:
          - maximum: 5.0
            minimum: 0.0
            type: integer
          - type: 'null'
          title: Canadian Context Integration
        coherence_cohesion:
          maximum: 5.0
          minimum: 0.0
          title: Coherence Cohesion
          type: integer
        discourse_marker_count:
          minimum: 0.0
          title: Discourse Marker Count
          type: integer
        error_density_per_100w:
          minimum: 0.0
          title: Error Density Per 100W
          type: number
        error_list:
          items:
            $ref: '#/components/schemas/ErrorAnnotation'
          title: Error List
          type: array
        grammatical_accuracy:
          maximum: 5.0
          minimum: 0.0
          title: Grammatical Accuracy
          type: integer
        lexical_range:
          maximum: 5.0
          minimum: 0.0
          title: Lexical Range
          type: integer
        register_appropriateness:
          maximum: 5.0
          minimum: 0.0
          title: Register Appropriateness
          type: integer
        task_completion:
          maximum: 5.0
          minimum: 0.0
          title: Task Completion
          type: integer
        total_20:
          maximum: 20.0
          minimum: 0.0
          title: Total 20
          type: integer
        type_token_ratio:
          maximum: 1.0
          minimum: 0.0
          title: Type Token Ratio
          type: number
      required:
      - task_completion
      - coherence_cohesion
      - lexical_range
      - grammatical_accuracy
      - register_appropriateness
      - total_20
      - error_density_per_100w
      - type_token_ratio
      - discourse_marker_count
      title: WritingRubric
      type: object
info:
  description: tcf-accel HTTP API. Phase 2 freezes the /v1/ contract from `02_ARCHITECTURE.md
    §2.4`; Phases 3–8 implement the handlers.
  title: tcf-accel API
  version: 0.1.0
openapi: 3.1.0
paths:
  /healthz:
    get:
      description: "Return a fixed payload indicating the process is alive.\n\nReturns:\n\
        \    A `HealthResponse` with `status=\"ok\"` and the current schema version."
      operationId: healthz_healthz_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
          description: Successful Response
      summary: Liveness probe
      tags:
      - meta
  /v1/auth/login:
    post:
      description: Authenticate and return a token pair.
      operationId: login_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '501':
          description: Phase 3 owns this implementation.
      summary: Exchange credentials for a token pair
      tags:
      - auth
  /v1/auth/refresh:
    post:
      description: Exchange a refresh token for a new access token.
      operationId: refresh_v1_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '501':
          description: Phase 3 owns this implementation.
      summary: Refresh the access token
      tags:
      - auth
  /v1/auth/signup:
    post:
      description: Create an account and return a token pair.
      operationId: signup_v1_auth_signup_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '501':
          description: Phase 3 owns this implementation.
      summary: Create a new account
      tags:
      - auth
  /v1/data:
    delete:
      description: Soft-delete the user; durable purge runs nightly.
      operationId: delete_data_v1_data_delete
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataDeleteResponse'
          description: Successful Response
        '501':
          description: Phase 9 owns this implementation.
      summary: Schedule erasure of the authenticated user's account
      tags:
      - data
  /v1/data/export:
    get:
      description: Stream the user's data as NDJSON.
      operationId: export_v1_data_export_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
            application/x-ndjson: {}
          description: NDJSON stream of every interaction, submission, plan, and estimate.
        '501':
          description: Phase 9 owns this implementation.
      summary: Stream the authenticated user's full history as NDJSON
      tags:
      - data
  /v1/diagnostic/start:
    post:
      description: 'Begin a fresh adaptive-diagnostic session.


        The umbrella session covers all four skills sequentially. The CAT

        advances per skill until each reaches its stopping criterion (variance

        ≤ 0.3 or 15 items).'
      operationId: start_v1_diagnostic_start_post
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticState'
          description: Successful Response
      summary: Start a diagnostic session
      tags:
      - diagnostic
  /v1/diagnostic/{session_id}/answer:
    post:
      description: Record one answer and advance the CAT state.
      operationId: answer_v1_diagnostic__session_id__answer_post
      parameters:
      - in: path
        name: session_id
        required: true
        schema:
          format: uuid
          title: Session Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiagnosticAnswer'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticState'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Submit an answer to a diagnostic item
      tags:
      - diagnostic
  /v1/diagnostic/{session_id}/finish:
    post:
      description: 'Close the session and return the report.


        Side-effect: writes each skill''s final posterior into the user''s

        `posteriors` dict so subsequent `/v1/plan` and `/v1/insights/readiness`

        calls reflect the diagnostic.'
      operationId: finish_v1_diagnostic__session_id__finish_post
      parameters:
      - in: path
        name: session_id
        required: true
        schema:
          format: uuid
          title: Session Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticReport'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Finalize the diagnostic and return per-skill estimates
      tags:
      - diagnostic
  /v1/health:
    get:
      description: Liveness probe under `/v1/`.
      operationId: v1_health_v1_health_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1HealthResponse'
          description: Successful Response
      summary: Versioned liveness probe
      tags:
      - meta
  /v1/insights/nclc-trajectory:
    get:
      description: Return the trajectory series.
      operationId: trajectory_v1_insights_nclc_trajectory_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NCLCTrajectory'
          description: Successful Response
        '501':
          description: Phase 8 owns this implementation.
      summary: Historical per-skill NCLC + forecast
      tags:
      - insights
  /v1/insights/readiness:
    get:
      description: 'Compute the readiness traffic light from the current posteriors.


        Phase 4 (this route) is the gate that enforces "no green without

        confidence" — the planner is forbidden by ADR-025 from showing

        green when any skill''s `confident=False`.'
      operationId: readiness_v1_insights_readiness_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Readiness'
          description: Successful Response
      summary: Traffic-light 'ready to book the exam?' answer
      tags:
      - insights
  /v1/insights/weak-points:
    get:
      description: Return the ranked weak-point list.
      operationId: weak_points_v1_insights_weak_points_get
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/WeakPoint'
                title: Response Weak Points V1 Insights Weak Points Get
                type: array
          description: Successful Response
        '501':
          description: Phase 8 owns this implementation.
      summary: Top error patterns per skill
      tags:
      - insights
  /v1/me:
    get:
      description: Return the authenticated user's profile.
      operationId: get_me_v1_me_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeProfile'
          description: Successful Response
        '501':
          description: Phase 3 owns this implementation.
      summary: Fetch the authenticated user's profile
      tags:
      - me
    patch:
      description: Apply a partial update to the profile.
      operationId: patch_me_v1_me_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeProfile'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '501':
          description: Phase 3 owns this implementation.
      summary: Partially update the authenticated user's profile
      tags:
      - me
  /v1/me/accessibility:
    get:
      description: 'Return the learner''s accessibility preferences.


        Local-only per ADR-017; the profile drives session-time drill

        routing (e.g., `co_alternative="lexical_alt"` swaps CO drills for

        the lexical alternative — `phase5_design.md §7`).'
      operationId: get_accessibility_v1_me_accessibility_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessibilityProfile'
          description: Successful Response
      summary: Fetch the learner's accessibility profile (ADR-029)
      tags:
      - me
    patch:
      description: Replace the learner's accessibility profile with the submitted
        one.
      operationId: patch_accessibility_v1_me_accessibility_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessibilityProfile'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessibilityProfile'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Update the learner's accessibility profile
      tags:
      - me
  /v1/mock-exam/start:
    post:
      description: 'Create a new mock-exam session.


        Enforces ADR-033 cadence cap. `mode=canonical` is the default

        and the only mode that updates the NCLC posterior.'
      operationId: start_v1_mock_exam_start_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MockExamStart'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockExamState'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Start a full mock exam (Phase 6 owner)
      tags:
      - mock-exam
  /v1/mock-exam/{exam_id}/advance:
    post:
      description: 'Advance to the next state.


        Used by the player when the module timer expires or the learner

        submits a module early. The break clocks also advance via this

        endpoint.'
      operationId: advance_v1_mock_exam__exam_id__advance_post
      parameters:
      - in: path
        name: exam_id
        required: true
        schema:
          format: uuid
          title: Exam Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockExamState'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Advance through the exam state machine (Phase 6 additive)
      tags:
      - mock-exam
  /v1/mock-exam/{exam_id}/answer:
    post:
      description: 'Record one item''s outcome.


        The server owns the correct-answer key — the client sends only the

        selected option id; correctness is derived here so a tampered

        client cannot inflate the score.'
      operationId: answer_v1_mock_exam__exam_id__answer_post
      parameters:
      - in: path
        name: exam_id
        required: true
        schema:
          format: uuid
          title: Exam Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MockExamAnswer'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockExamState'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Record an MCQ or rubric outcome
      tags:
      - mock-exam
  /v1/mock-exam/{exam_id}/co-play:
    post:
      description: 'Increment the play count for a CO item; refuse if already played.


        ADR-029 + `phase6_think.md §2.3`: each CO audio plays exactly once

        per mock. The server tracks the count; the client cannot re-trigger.'
      operationId: co_play_v1_mock_exam__exam_id__co_play_post
      parameters:
      - in: path
        name: exam_id
        required: true
        schema:
          format: uuid
          title: Exam Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MockExamCoPlay'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockExamState'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Record a CO audio play (single play enforced server-side)
      tags:
      - mock-exam
  /v1/mock-exam/{exam_id}/items/{module}:
    get:
      description: 'Return the redacted items for one module.


        The response is a list of dicts (not typed `Item`) because the

        redaction layer strips fields that the frozen `Item` model requires

        — see `phase6_design.md §10.1`.'
      operationId: get_items_v1_mock_exam__exam_id__items__module__get
      parameters:
      - in: path
        name: exam_id
        required: true
        schema:
          format: uuid
          title: Exam Id
          type: string
      - in: path
        name: module
        required: true
        schema:
          enum:
          - CO
          - CE
          - EE
          - EO
          title: Module
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  additionalProperties: true
                  type: object
                title: Response Get Items V1 Mock Exam  Exam Id  Items  Module  Get
                type: array
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Module items (redacted; answer keys never included)
      tags:
      - mock-exam
  /v1/mock-exam/{exam_id}/report:
    get:
      description: 'Return the headline report.


        The full Markdown/HTML report lives at `item_log_uri`; the wire

        response is intentionally compact (see `phase6_design.md §7`).'
      operationId: get_report_v1_mock_exam__exam_id__report_get
      parameters:
      - in: path
        name: exam_id
        required: true
        schema:
          format: uuid
          title: Exam Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockExamReport'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Fetch the scored mock-exam report
      tags:
      - mock-exam
  /v1/mock-exam/{exam_id}/state:
    get:
      description: Return the current state envelope — no answer fields, ever.
      operationId: get_state_v1_mock_exam__exam_id__state_get
      parameters:
      - in: path
        name: exam_id
        required: true
        schema:
          format: uuid
          title: Exam Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockExamState'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Current mock-exam state (never reveals answers)
      tags:
      - mock-exam
  /v1/mock-exam/{exam_id}/submit:
    post:
      description: 'Move to FINISHED, enqueue the scoring task, then SCORED.


        Training mode mocks are scored but do *not* update the user''s

        canonical mock streak; the report renderer flags this.'
      operationId: submit_v1_mock_exam__exam_id__submit_post
      parameters:
      - in: path
        name: exam_id
        required: true
        schema:
          format: uuid
          title: Exam Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockExamState'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
