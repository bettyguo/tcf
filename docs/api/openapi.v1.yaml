          - type: 'null'
          title: Phoneme Error Rate
        pronunciation_prosody:
          maximum: 5.0
          minimum: 0.0
          title: Pronunciation Prosody
          type: integer
        task_completion:
          maximum: 5.0
          minimum: 0.0
          title: Task Completion
          type: integer
        total_20:
          maximum: 20.0
          minimum: 0.0
          title: Total 20
          type: integer
        wpm:
