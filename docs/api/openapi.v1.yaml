    Provenance:
      additionalProperties: false
      description: "Chain-of-custody for an item.\n\nEvery item carries one of these.\
        \ The fields are deliberately verbose so\n`audit-content` (Phase 3+) can reconstruct\
        \ any item's origin without\nconsulting external systems.\n\nExample:\n  \
        \  >>> from datetime import UTC, datetime\n    >>> Provenance(\n    ...  \
        \   source=\"common_voice_fr_v17\",\n    ...     source_id=\"19284732\",\n\
        \    ...     license=\"CC0-1.0\",\n    ...     ingested_at=datetime(2026,\
        \ 6, 1, tzinfo=UTC),\n    ...     review_status=\"auto_passed\",\n    ...\
        \ ).license\n    'CC0-1.0'\n\nComplexity: O(1) construction."
      properties:
        fetcher_version:
          anyOf:
          - type: string
          - type: 'null'
          title: Fetcher Version
        ingested_at:
          description: UTC timestamp of ingestion.
          format: date-time
          title: Ingested At
          type: string
        license:
          description: SPDX-style identifier (e.g. 'CC0-1.0', 'CC-BY-SA-4.0') or 'proprietary'
            for unredistributable items.
          title: License
          type: string
        llm_model:
          anyOf:
          - type: string
          - type: 'null'
          title: Llm Model
        llm_prompt_hash:
          anyOf:
          - type: string
          - type: 'null'
          description: sha256 of the rendered LLM prompt; used for reproducibility
            audits.
          title: Llm Prompt Hash
        review_notes:
          anyOf:
          - type: string
          - type: 'null'
          title: Review Notes
        review_status:
          default: auto_passed
          enum:
          - auto_passed
          - human_approved
          - human_modified
          - rejected
          - pending_review
          title: Review Status
          type: string
        source:
          description: Logical source identifier, e.g. 'common_voice_fr_v17'.
          title: Source
          type: string
        source_id:
          description: Stable id within the source.
          title: Source Id
          type: string
        synthesizer_version:
          anyOf:
          - type: string
          - type: 'null'
          title: Synthesizer Version
      required:
      - source
      - source_id
      - license
      - ingested_at
      title: Provenance
      type: object
