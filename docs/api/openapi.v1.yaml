components:
  schemas:
    AccessibilityProfile:
      additionalProperties: false
      description: 'Per-learner accessibility preferences (Phase 5, ADR-029).


        Setting `co_alternative="lexical_alt"` reroutes any CO drill the

        planner emits to `co_lexical_alt`, which writes `Interaction.module

        = "CE"` and does *not* contribute to the CO posterior. The UX

        banner is mandatory; see `phase5_design.md §7.3`.


        `ee_alternative="speech_to_text"` plugs STT at the EE drill''s input

        layer; the rubric still scores the resulting text. `eo_alternative

        = "text_input"` swaps the EO drill for a text-input variant that

        emits `module="EE"` with a banner-disclaimed "does not measure

        real EO" caveat.


        `dyslexia_font` and `high_contrast` are UI-only signals consumed

        by the Phase 8 frontend.'
      properties:
        co_alternative:
          default: none
          enum:
          - none
          - lexical_alt
          title: Co Alternative
          type: string
        dyslexia_font:
          default: false
          title: Dyslexia Font
          type: boolean
        ee_alternative:
          default: none
          enum:
          - none
          - speech_to_text
          title: Ee Alternative
          type: string
        eo_alternative:
          default: none
          enum:
          - none
          - text_input
          title: Eo Alternative
          type: string
        high_contrast:
          default: false
          title: High Contrast
          type: boolean
      title: AccessibilityProfile
      type: object
    Body_submit_ee_v1_submission_ee_post:
      properties:
        item_id:
          format: uuid
          title: Item Id
          type: string
        text:
          description: The candidate's written response (UTF-8).
          title: Text
          type: string
      required:
      - item_id
      - text
      title: Body_submit_ee_v1_submission_ee_post
      type: object
    Body_submit_eo_v1_submission_eo_post:
      properties:
        audio:
          contentMediaType: application/octet-stream
          description: The candidate's recording (wav/ogg/m4a).
          title: Audio
          type: string
        item_id:
          format: uuid
          title: Item Id
          type: string
      required:
      - item_id
      - audio
      title: Body_submit_eo_v1_submission_eo_post
      type: object
    CEContent:
      additionalProperties: false
      description: "Compréhension écrite item content.\n\nExample:\n    >>> from tcf_accel.schemas.content.co\
        \ import MCQ, MCQOption\n    >>> CEContent(\n    ...     passage=(\n    ...\
        \         \"Avis aux clients : nous serons fermés lundi en raison de travaux.\
        \ \"\n    ...         \"Nous rouvrirons mardi à neuf heures. Merci de votre\
        \ compréhension.\"\n    ...     ),\n    ...     genre='admin',\n    ...  \
        \   word_count=21,\n    ...     questions=[MCQ(\n    ...         id='q1',\
        \ prompt='Quand fermons-nous ?',\n    ...         options=[MCQOption(id='a',\
        \ text='lundi'),\n    ...                  MCQOption(id='b', text='mardi')],\n\
        \    ...         correct_option_id='a',\n    ...     )],\n    ... ).module\n\
        \    'CE'"
      properties:
        genre:
          enum:
          - news
          - ad
          - letter
          - admin
          - academic
          - narrative
          title: Genre
          type: string
        module:
          const: CE
          default: CE
          title: Module
          type: string
        passage:
          minLength: 1
          title: Passage
          type: string
        questions:
          items:
            $ref: '#/components/schemas/MCQ'
          minItems: 1
          title: Questions
          type: array
        word_count:
          maximum: 2000.0
          minimum: 20.0
          title: Word Count
          type: integer
      required:
      - passage
      - genre
      - word_count
      - questions
      title: CEContent
      type: object
    COContent:
      additionalProperties: false
      description: "Compréhension orale item content.\n\nExample:\n    >>> COContent(\n\
        \    ...     transcript=\"Bonjour, c'est Annick.\",\n    ...     duration_s=8.5,\n\
        \    ...     speakers=[Speaker(label='A', accent='fr-FR')],\n    ...     accent='fr-FR',\n\
        \    ...     register='standard',\n    ...     questions=[MCQ(\n    ...  \
        \       id='q1', prompt='Qui parle ?',\n    ...         options=[MCQOption(id='a',\
        \ text='Annick'),\n    ...                  MCQOption(id='b', text='Pierre')],\n\
        \    ...         correct_option_id='a',\n    ...     )],\n    ... ).module\n\
        \    'CO'"
      properties:
        accent:
          enum:
          - fr-FR
          - fr-CA
          - fr-BE
          - fr-CH
          - fr-AF
          - mixed
          title: Accent
          type: string
        audio_local_path:
          anyOf:
          - type: string
          - type: 'null'
          description: Filesystem path for operator-cached audio (privacy_mode=local_only).
          title: Audio Local Path
        audio_url:
          anyOf:
          - format: uri
            minLength: 1
            type: string
          - type: 'null'
          title: Audio Url
        duration_s:
          maximum: 600.0
          minimum: 1.0
          title: Duration S
          type: number
        module:
          const: CO
          default: CO
          title: Module
          type: string
        questions:
          items:
            $ref: '#/components/schemas/MCQ'
          minItems: 1
          title: Questions
          type: array
        register:
          enum:
          - soutenu
          - standard
          - familier
          title: Register
          type: string
        speakers:
          items:
            $ref: '#/components/schemas/Speaker'
          minItems: 1
          title: Speakers
          type: array
        transcript:
          minLength: 1
          title: Transcript
          type: string
      required:
      - transcript
      - duration_s
      - speakers
      - accent
      - register
      - questions
      title: COContent
      type: object
    DailyBlock:
      additionalProperties: false
      description: All blocks scheduled for a single calendar date.
      properties:
        blocks:
          items:
            $ref: '#/components/schemas/PlanBlock'
          title: Blocks
          type: array
        date:
          format: date
          title: Date
          type: string
        total_minutes:
          description: Sum of `block.minutes`; cached for the UI.
          minimum: 0.0
          title: Total Minutes
          type: integer
      required:
      - date
      - total_minutes
      title: DailyBlock
      type: object
    DataDeleteResponse:
      additionalProperties: false
      description: Returned by `DELETE /v1/data` after a successful soft-delete.
      properties:
        deleted:
          title: Deleted
          type: boolean
        scheduled_purge_at:
          format: date-time
          title: Scheduled Purge At
          type: string
      required:
      - deleted
      - scheduled_purge_at
      title: DataDeleteResponse
      type: object
    DiagnosticAnswer:
      additionalProperties: false
      description: The candidate's response to a single diagnostic item.
      properties:
        item_id:
          format: uuid
          title: Item Id
          type: string
        response:
          additionalProperties: true
          description: MCQ option id, free text, audio URI, etc. Shape depends on
            the item's module.
          title: Response
          type: object
        rt_ms:
          description: Response time in milliseconds.
          minimum: 0.0
          title: Rt Ms
          type: integer
      required:
      - item_id
      - response
      - rt_ms
      title: DiagnosticAnswer
      type: object
    DiagnosticReport:
      additionalProperties: false
      description: Final diagnostic report — returned by `POST /v1/diagnostic/{id}/finish`.
      properties:
        bottleneck_skill:
          description: The lowest NCLC skill; the planner will weight this skill first.
          enum:
          - CO
          - CE
          - EE
          - EO
          title: Bottleneck Skill
          type: string
        completed_at:
          format: date-time
          title: Completed At
          type: string
        confidence_summary:
          description: 'high: all four skills `confident=True`. partial: some skills
            confident. exploratory: no skill confident — user should do another session
            before booking the exam.'
          enum:
          - high
          - partial
          - exploratory
          title: Confidence Summary
          type: string
        per_skill:
          items:
            $ref: '#/components/schemas/SkillLevel'
          minItems: 1
          title: Per Skill
          type: array
        plan_id:
          anyOf:
          - type: string
          - type: 'null'
          description: Id of the StudyPlan generated from this diagnostic, if any.
          title: Plan Id
        session_id:
          format: uuid
          title: Session Id
          type: string
        user_id:
          format: uuid
          title: User Id
          type: string
      required:
      - session_id
      - user_id
      - completed_at
      - per_skill
      - bottleneck_skill
      - confidence_summary
      title: DiagnosticReport
      type: object
    DiagnosticState:
      additionalProperties: false
      description: Mid-flight state of the adaptive diagnostic session.
      properties:
        completed_modules:
          items:
            enum:
            - CO
            - CE
            - EE
            - EO
            type: string
          title: Completed Modules
          type: array
        current_module:
          anyOf:
          - enum:
            - CO
            - CE
            - EE
            - EO
            type: string
          - type: 'null'
          description: The module the next item will be drawn from; None when finished.
          title: Current Module
        estimates_in_progress:
          additionalProperties:
            type: number
          description: Running posterior mean per skill (continuous NCLC). UI shows
            these only with a confidence indicator.
          propertyNames:
            enum:
            - CO
            - CE
            - EE
            - EO
          title: Estimates In Progress
          type: object
        finished_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Finished At
        id:
          format: uuid
          title: Id
          type: string
        items_seen:
          minimum: 0.0
          title: Items Seen
          type: integer
        next_item_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          description: Pre-fetched next item; the client renders this when the user
            advances.
          title: Next Item Id
        started_at:
          format: date-time
          title: Started At
          type: string
        user_id:
          format: uuid
          title: User Id
          type: string
      required:
      - id
      - user_id
      - started_at
      - items_seen
      title: DiagnosticState
      type: object
    EEContent:
      additionalProperties: false
      description: "Expression écrite item content.\n\nExample:\n    >>> EEContent(\n\
        \    ...     task_number=2,\n    ...     prompt=\"Vous écrivez à votre voisin\
        \ pour vous plaindre du bruit.\",\n    ...     target_word_count_range=(120,\
        \ 150),\n    ...     required_canadian_context=True,\n    ...     rubric_version='ee.v1',\n\
        \    ... ).module\n    'EE'"
      properties:
        module:
          const: EE
          default: EE
          title: Module
          type: string
        prompt:
          minLength: 1
          title: Prompt
          type: string
        required_canadian_context:
          description: True for Task 2 and Task 3 per TCF Canada spec.
          title: Required Canadian Context
          type: boolean
        rubric_version:
          description: Pinned per release; the Phase 7 rubric scorer uses this to
            select the correct prompt template.
          minLength: 1
          title: Rubric Version
          type: string
        target_word_count_range:
          description: (min, max) word count expected for a complete response.
          maxItems: 2
          minItems: 2
          prefixItems:
          - type: integer
          - type: integer
          title: Target Word Count Range
          type: array
        task_number:
          enum:
          - 1
          - 2
          - 3
          title: Task Number
          type: integer
      required:
      - task_number
      - prompt
      - target_word_count_range
      - required_canadian_context
      - rubric_version
      title: EEContent
      type: object
    EOContent:
      additionalProperties: false
      description: "Expression orale item content.\n\nExample:\n    >>> EOContent(\n\
        \    ...     task_number=1,\n    ...     examiner_prompts=['Présentez-vous.',\
        \ \"Parlez de votre travail.\"],\n    ...     candidate_prep_time_s=0,\n \
        \   ...     target_duration_s=120,\n    ...     rubric_version='eo.v1',\n\
        \    ... ).module\n    'EO'"
      properties:
        candidate_prep_time_s:
          description: Allowed preparation time before the candidate speaks; usually
            0 for Task 1.
          maximum: 600.0
          minimum: 0.0
          title: Candidate Prep Time S
          type: integer
        examiner_prompts:
          items:
            type: string
          minItems: 1
          title: Examiner Prompts
          type: array
        module:
          const: EO
          default: EO
          title: Module
          type: string
        rubric_version:
          description: Pinned per release; the Phase 7 rubric scorer uses this to
            select the correct prompt template.
          minLength: 1
          title: Rubric Version
          type: string
        target_duration_s:
          description: Target speaking duration; the rubric penalizes large deviations.
          maximum: 600.0
          minimum: 30.0
          title: Target Duration S
          type: integer
        task_number:
          enum:
          - 1
          - 2
          - 3
          title: Task Number
          type: integer
      required:
      - task_number
      - examiner_prompts
      - candidate_prep_time_s
      - target_duration_s
      - rubric_version
      title: EOContent
      type: object
    ErrorAnnotation:
      additionalProperties: false
      description: A spanned error in a learner's writing or speaking transcript.
      properties:
        confidence:
          maximum: 1.0
          minimum: 0.0
          title: Confidence
          type: number
        error_type:
          enum:
          - spelling
          - agreement
          - tense
          - preposition
          - article
          - syntax
          - register
          - vocabulary
          - cohesion
          - other
          title: Error Type
          type: string
        span_end:
          minimum: 0.0
          title: Span End
          type: integer
        span_start:
          minimum: 0.0
          title: Span Start
          type: integer
        suggestion:
          anyOf:
          - type: string
          - type: 'null'
          title: Suggestion
      required:
      - span_start
      - span_end
      - error_type
      - confidence
      title: ErrorAnnotation
      type: object
    ErrorEnvelope:
      additionalProperties: false
      description: JSON shape returned by every non-2xx response.
      properties:
        code:
          description: 'Stable error code (ADR-014). Format: E_<DOMAIN>_<NNN>; DOMAIN
            may contain underscores (e.g. E_NOT_IMPLEMENTED_001).'
          pattern: ^E_[A-Z][A-Z_]*_\d{3}$
          title: Code
          type: string
        context:
          additionalProperties: true
          description: Structured context for the error. Keys are stable per code
            (ADR-014 point 6).
          title: Context
          type: object
        http_status:
          maximum: 599.0
          minimum: 400.0
          title: Http Status
          type: integer
        message:
          description: Default-locale rendered message (EN).
          minLength: 1
          title: Message
          type: string
        message_localized:
          additionalProperties:
            type: string
          description: Locale → rendered message. Keys are BCP-47 codes (e.g. 'en',
            'fr').
          title: Message Localized
          type: object
        phase:
          anyOf:
          - type: integer
          - type: 'null'
          description: Set only on 501 E_NOT_IMPLEMENTED_001 to indicate the owning
            build phase.
          title: Phase
      required:
      - code
      - http_status
      - message
      title: ErrorEnvelope
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    HealthResponse:
      description: Healthz response payload.
      properties:
        phase:
          description: Current build-phase number; sanity-checked in tests.
          title: Phase
          type: integer
        schema_version:
          description: '`tcf_accel.schemas.version.SCHEMA_VERSION`.'
          title: Schema Version
          type: string
        status:
          const: ok
          default: ok
          title: Status
          type: string
      required:
      - phase
      - schema_version
      title: HealthResponse
      type: object
    Item:
      additionalProperties: false
      description: 'A content-bank item across CO / CE / EE / EO modules.


        Phase 1''s frozen contract. Phase 2 narrowed the `content` field''s

        type from a permissive placeholder to the discriminated union above.

        The wire shape is unchanged for any Phase 1-conformant payload.

        Further changes require an ADR + a `SCHEMA_VERSION` bump + a

        `CHANGELOG.md` entry.'
      properties:
        cefr_level:
          enum:
          - A1
          - A2
          - B1
          - B2
          - C1
          - C2
          title: Cefr Level
          type: string
        content:
          discriminator:
            mapping:
              CE: '#/components/schemas/CEContent'
              CO: '#/components/schemas/COContent'
              EE: '#/components/schemas/EEContent'
              EO: '#/components/schemas/EOContent'
            propertyName: module
          oneOf:
          - $ref: '#/components/schemas/COContent'
          - $ref: '#/components/schemas/CEContent'
          - $ref: '#/components/schemas/EEContent'
          - $ref: '#/components/schemas/EOContent'
          title: Content
        difficulty_irt:
          anyOf:
          - type: number
          - type: 'null'
          description: IRT 2PL `b` parameter; set by the nightly calibration job (Phase
            4 + ADR-0013).
          title: Difficulty Irt
        discrimination_irt:
          anyOf:
          - type: number
          - type: 'null'
          description: IRT 2PL `a` parameter; set by the nightly calibration job (Phase
            4 + ADR-0013).
          title: Discrimination Irt
        id:
          format: uuid
          title: Id
          type: string
        metadata:
          $ref: '#/components/schemas/ItemMetadata'
        module:
          enum:
          - CO
          - CE
          - EE
          - EO
          title: Module
          type: string
        provenance:
          $ref: '#/components/schemas/Provenance'
        quality_flags:
          items:
            $ref: '#/components/schemas/QualityFlag'
          title: Quality Flags
          type: array
        retired:
          default: false
          title: Retired
          type: boolean
        schema_version:
          default: 0.4.0
          title: Schema Version
          type: string
        synthetic:
          default: false
          title: Synthetic
          type: boolean
      required:
      - id
      - module
      - cefr_level
      - content
      - provenance
      title: Item
      type: object
    ItemMetadata:
      additionalProperties: true
      description: 'Open-ended metadata bag for retrieval, clustering, and analytics.


        The model remains `extra="allow"`, so any field not listed here is

        accepted and round-trips through the JSONB column. The fields

        enumerated below are *documented* surfaces — populated by the

        Phase 3 content pipeline and consumed by Phase 4+. Adding a new

        optional field here is a non-breaking change.'
      properties:
        calibration_anchors:
          anyOf:
          - additionalProperties:
              type: string
            type: object
          - type: 'null'
          description: EE/EO-only model-response anchors keyed by 'nclc_7', 'nclc_9',
            'nclc_11'; Phase 7 calibrates the rubric scorer against these.
          title: Calibration Anchors
        canadian_context:
          anyOf:
          - type: boolean
          - type: 'null'
          description: True iff the item's content is Canadian-flavored (EE/EO Tasks
            2&3 require True).
          title: Canadian Context
        cefr_confidence:
          anyOf:
          - maximum: 1.0
            minimum: 0.0
            type: number
          - type: 'null'
          description: Max-softmax post-calibration probability from the CEFR classifier.
          title: Cefr Confidence
        cefr_distribution:
          anyOf:
          - additionalProperties:
              type: number
            type: object
          - type: 'null'
          description: Full A1..C2 softmax distribution at the time the item was classified.
          title: Cefr Distribution
        co_acoustic:
          anyOf:
          - additionalProperties:
              type: number
            type: object
          - type: 'null'
          description: 'CO-only acoustic features: keys ''speech_rate_wpm'', ''lexical_density'',
            ''n_speakers_diarized'', ''noisiness_proxy''.'
          title: Co Acoustic
        created_by:
          anyOf:
          - type: string
          - type: 'null'
          title: Created By
        seed:
          anyOf:
          - type: integer
          - type: 'null'
          description: Deterministic seed used during synthesis; enables reproducibility.
          title: Seed
        synthesis_trace_uri:
          anyOf:
          - type: string
          - type: 'null'
          description: Local-only pointer to data/cache/quality/<item_id>.json with
            the full synthesis trace.
          title: Synthesis Trace Uri
        tags:
          items:
            type: string
          title: Tags
          type: array
        topic:
          anyOf:
          - type: string
          - type: 'null'
          title: Topic
        topic_cluster_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Topic Cluster Id
      title: ItemMetadata
      type: object
    LoginRequest:
      additionalProperties: false
      properties:
        email:
          format: email
          title: Email
          type: string
        password:
          maxLength: 200
          minLength: 1
          title: Password
          type: string
      required:
      - email
      - password
      title: LoginRequest
      type: object
    MCQ:
      additionalProperties: false
      description: 'A multiple-choice question.


        Used by both CO and CE items. Invariant: `correct_option_id` must

        appear in `options`.'
      properties:
        correct_option_id:
          title: Correct Option Id
          type: string
        explanation:
          anyOf:
          - type: string
          - type: 'null'
          title: Explanation
        id:
          description: Stable question id within the item.
          minLength: 1
          title: Id
          type: string
        options:
          items:
            $ref: '#/components/schemas/MCQOption'
          minItems: 2
          title: Options
          type: array
        prompt:
          minLength: 1
          title: Prompt
          type: string
      required:
      - id
      - prompt
      - options
      - correct_option_id
      title: MCQ
      type: object
    MCQOption:
      additionalProperties: false
      description: One option in a multiple-choice question.
      properties:
        id:
          description: Short stable slug, e.g. 'a', 'b', 'c'.
          maxLength: 8
          minLength: 1
          title: Id
          type: string
        text:
          minLength: 1
          title: Text
          type: string
      required:
      - id
      - text
      title: MCQOption
      type: object
    MeProfile:
      additionalProperties: false
      description: The authenticated user's full profile.
      properties:
        created_at:
          format: date-time
          title: Created At
          type: string
        daily_minutes_budget:
          maximum: 480.0
          minimum: 15.0
          title: Daily Minutes Budget
          type: integer
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
        email:
          format: email
          title: Email
          type: string
        id:
          format: uuid
          title: Id
          type: string
        locale:
          enum:
          - en
          - fr
          - es
          - ar
          - zh
          title: Locale
          type: string
        privacy_mode:
          description: Default 'local_only' per ADR-0017; flipping to 'cloud_optin'
            requires explicit opt-in.
          enum:
          - local_only
          - cloud_optin
          title: Privacy Mode
          type: string
        target_exam_date:
          anyOf:
          - format: date
            type: string
          - type: 'null'
          title: Target Exam Date
        target_nclc:
          maximum: 12.0
          minimum: 4.0
          title: Target Nclc
          type: integer
      required:
      - id
      - email
      - display_name
      - target_nclc
      - target_exam_date
      - daily_minutes_budget
      - locale
      - privacy_mode
      - created_at
      title: MeProfile
      type: object
    MockExamAnswer:
      additionalProperties: false
      description: Body of `POST /v1/mock-exam/{id}/answer` (Phase 6 additive).
      properties:
        item_id:
          format: uuid
          title: Item Id
          type: string
        kind:
          enum:
          - mcq
          - rubric
          title: Kind
          type: string
        module:
          enum:
          - CO
          - CE
          - EE
          - EO
          title: Module
          type: string
        rt_ms:
          default: 0
          minimum: 0.0
          title: Rt Ms
          type: integer
        rubric_total_20:
          anyOf:
          - maximum: 20.0
            minimum: 0.0
            type: number
          - type: 'null'
          description: Required when kind=rubric.
          title: Rubric Total 20
