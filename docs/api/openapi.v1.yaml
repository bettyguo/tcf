        tolerated as in `WritingRubric`.


        `phoneme_error_rate` is null when the ASR didn''t deliver a confident

        phoneme alignment (Phase 7 ADR-031 — pronunciation as a coarse

        proxy); the rubric is still valid without it.'
      properties:
        fluency_pace:
          maximum: 5.0
          minimum: 0.0
