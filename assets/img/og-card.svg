<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf6ec"/>
      <stop offset="100%" stop-color="#f4ecd9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f5f43"/>
      <stop offset="100%" stop-color="#4b8a3e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.6">
      <stop offset="0%" stop-color="#1f5f43" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1f5f43" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo -->
  <g transform="translate(64 64)">
    <rect width="56" height="56" rx="14" fill="url(#accent)"/>
    <path d="M14 22 L28 14 L42 22 L42 40 L28 48 L14 40 Z" fill="none" stroke="white" stroke-width="3" stroke-linejoin="round" opacity="0.94"/>
    <circle cx="28" cy="30" r="4" fill="white"/>
  </g>
  <text x="136" y="103" fill="#131c2e" font-size="28" font-weight="700">tcf-accel</text>
  <text x="240" y="103" fill="#1f5f43" font-size="20" font-weight="600">v1.0.0</text>

  <!-- Title -->
  <text x="64" y="280" fill="#131c2e" font-size="76" font-weight="700" letter-spacing="-3">An honest path</text>
  <text x="64" y="360" fill="#131c2e" font-size="76" font-weight="700" letter-spacing="-3">from <tspan fill="#1f5f43">B1 to NCLC 7–9</tspan></text>
  <text x="64" y="440" fill="#131c2e" font-size="76" font-weight="700" letter-spacing="-3">in 12 weeks.</text>

  <!-- Subtitle -->
  <text x="64" y="510" fill="#404a64" font-size="28" font-weight="400">Open-source, evidence-based French training for the TCF Canada.</text>

  <!-- Pills -->
  <g transform="translate(64 560)" font-size="20" font-weight="600">
    <rect x="0" y="0" width="220" height="44" rx="22" fill="#e1ecd9"/>
    <text x="110" y="29" fill="#0f3a26" text-anchor="middle">All 12 gates green</text>
    <rect x="236" y="0" width="180" height="44" rx="22" fill="#e1ecd9"/>
    <text x="326" y="29" fill="#0f3a26" text-anchor="middle">MIT · CC BY-SA</text>
    <rect x="432" y="0" width="220" height="44" rx="22" fill="#e1ecd9"/>
    <text x="542" y="29" fill="#0f3a26" text-anchor="middle">Honesty receipts</text>
  </g>

  <!-- Right-side readiness chip -->
  <g transform="translate(820 200)">
    <rect width="320" height="280" rx="20" fill="white" stroke="#e5dcc7"/>
    <text x="22" y="42" fill="#404a64" font-size="14" font-weight="600" letter-spacing="1">READINESS</text>
    <g transform="translate(220 24)">
      <rect width="76" height="26" rx="13" fill="#e1ecd9"/>
      <circle cx="14" cy="13" r="5" fill="#1f5f43"/>
      <text x="42" y="18" fill="#0f3a26" font-size="13" font-weight="700">READY</text>
    </g>
    <text x="22" y="92" fill="#131c2e" font-size="28" font-weight="700">NCLC 7–9</text>
    <text x="22" y="118" fill="#6b7793" font-size="14">2/2 mocks green · all 4 skills confident</text>

    <g transform="translate(22 140)" font-size="13" font-weight="700" fill="#404a64">
      <text y="0">CO 7.4</text>
      <rect x="60" y="-12" width="220" height="6" rx="3" fill="#f4ecd9"/>
      <rect x="120" y="-12" width="36" height="6" rx="3" fill="#7fb89b"/>
      <text y="30">CE 7.6</text>
      <rect x="60" y="18" width="220" height="6" rx="3" fill="#f4ecd9"/>
      <rect x="130" y="18" width="32" height="6" rx="3" fill="#7fb89b"/>
      <text y="60">EE 7.2</text>
      <rect x="60" y="48" width="220" height="6" rx="3" fill="#f4ecd9"/>
      <rect x="116" y="48" width="40" height="6" rx="3" fill="#7fb89b"/>
      <text y="90">EO 7.1</text>
      <rect x="60" y="78" width="220" height="6" rx="3" fill="#f4ecd9"/>
      <rect x="112" y="78" width="44" height="6" rx="3" fill="#7fb89b"/>
    </g>
  </g>
</svg>
